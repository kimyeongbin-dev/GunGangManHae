<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GunGangManHae - 배틀그라운드 팀 경매</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 1200px; margin: 30px auto; padding: 20px; background-color: #1e1e24; color: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #f39c12; letter-spacing: 2px; }
        .box { background: #2b2b36; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* 모달 공통 스타일 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2b2b36; padding: 30px; border-radius: 8px; width: 400px; border: 2px solid #f39c12; position: relative; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; border: none; border-radius: 4px; box-sizing: border-box; background: #fff; font-family: inherit; }
        .modal-content button { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; margin-bottom: 10px; }
        .btn-primary { background: #f39c12; color: #1e1e24; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-cancel { background: #7f8c8d; color: #fff; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #aaa; cursor: pointer; font-size: 20px; font-weight: bold; }
        .close-btn:hover { color: #fff; }

        /* 8x8 참가자 그리드 레이아웃 */
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-top: 15px; }
        .grid-cell { background-color: #3a3a48; border: 1px solid #444; border-radius: 4px; aspect-ratio: 16 / 9; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8px; box-sizing: border-box; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .grid-cell:hover { border-color: #aaa; background-color: #4a4a5a; }
        .grid-cell.active { border-color: #f39c12; background-color: #2e2e3a; }
        .grid-cell.active:hover { background-color: #3e3e4a; }
        .grid-cell.teamed { border-color: #2ecc71; background-color: #1e3a29; }
        .grid-cell.teamed:hover { background-color: #2e4a39; }
        
        .cell-name { font-weight: bold; color: #f39c12; font-size: 13px; margin-bottom: 2px; }
        .cell-stats { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .cell-intro { font-size: 10px; color: #888; font-style: italic; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .team-label { color: #2ecc71; font-weight: bold; font-size: 11px; margin-top: 4px; }
        
        /* 4x4 완성된 팀 그리드 레이아웃 */
        .team-grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .team-cell { background-color: #3a3a48; border: 1px solid #444; border-radius: 6px; padding: 15px; min-height: 100px; display: flex; flex-direction: column; }
        .team-cell.empty { align-items: center; justify-content: center; color: #777; font-size: 14px; background-color: #2a2a35; }
        .team-cell.active { border-color: #2ecc71; background-color: #1e2a22; }
        
        .team-title { margin-top: 0; margin-bottom: 10px; color: #2ecc71; font-size: 16px; border-bottom: 1px solid #334; padding-bottom: 5px; }
        .team-member { display: inline-block; background: #333; padding: 4px 8px; border-radius: 4px; margin: 0 4px 6px 0; font-size: 13px; border-left: 2px solid #2ecc71; }
    </style>
</head>
<body>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">X</span>
            <h2 style="margin-top:0; color:#f39c12; text-align:center;">신규 참가자 등록</h2>
            <label>닉네임 (또는 실명)</label>
            <input type="text" id="add-name" placeholder="예: 춘천불주먹">
            
            <label>배그 티어</label>
            <select id="add-tier">
                <option value="브론즈">브론즈</option>
                <option value="실버">실버</option>
                <option value="골드">골드</option>
                <option value="플래티넘">플래티넘</option>
                <option value="다이아">다이아</option>
                <option value="마스터">마스터</option>
                <option value="그랜드마스터">그랜드마스터</option>
            </select>
            
            <label>평균 딜량 (숫자만)</label>
            <input type="number" id="add-damage" placeholder="예: 250">
            
            <label>한 줄 소갯말</label>
            <input type="text" id="add-intro" placeholder="예: 오더 잘 듣습니다.">
            
            <button class="btn-primary" onclick="addUser()">등록하기</button>
            <button class="btn-cancel" onclick="closeModals()">취소</button>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">X</span>
            <h2 style="margin-top:0; color:#f39c12; text-align:center;">참가자 정보 수정</h2>
            <p id="edit-fakename" style="text-align:center; color:#aaa; font-size:12px; margin-top:-10px;"></p>
            
            <label>닉네임 (또는 실명)</label>
            <input type="text" id="edit-name">
            
            <label>배그 티어</label>
            <select id="edit-tier">
                <option value="브론즈">브론즈</option>
                <option value="실버">실버</option>
                <option value="골드">골드</option>
                <option value="플래티넘">플래티넘</option>
                <option value="다이아">다이아</option>
                <option value="마스터">마스터</option>
                <option value="그랜드마스터">그랜드마스터</option>
            </select>
            
            <label>평균 딜량 (숫자만)</label>
            <input type="number" id="edit-damage">
            
            <label>한 줄 소갯말</label>
            <input type="text" id="edit-intro">

            <label>소속 팀 배정 (완성 시 입력)</label>
            <input type="text" id="edit-team" placeholder="예: 1팀 (미배정 시 비워둠)">
            
            <button class="btn-primary" onclick="updateUser()">정보 수정</button>
            <button class="btn-danger" onclick="deleteUser()">참가자 삭제</button>
        </div>
    </div>

    <div class="header">
        <h1>GunGangManHae</h1>
    </div>

    <div class="box">
        <h3 style="margin: 0; margin-bottom: 5px;">참가자 엔트리 현황 (최대 64명)</h3>
        <p style="font-size: 13px; color: #aaa; margin: 0 0 15px 0;">빈 자리를 클릭하면 참가자를 추가할 수 있고, 등록된 참가자를 클릭하면 수정/삭제 및 팀 배정이 가능합니다.</p>
        <div id="participant-grid" class="grid-container">
            </div>
    </div>

    <div class="box">
        <h3 style="margin-top:0; color:#2ecc71;">완성된 팀 현황판 (총 16팀)</h3>
        <p style="font-size: 13px; color: #aaa; margin-top: -10px;">참가자 수정 창에서 같은 '팀 이름'을 4명에게 부여하면 이곳에 자동으로 채워집니다.</p>
        <div id="team-grid" class="team-grid-container">
            </div>
    </div>

<script>
    const SUPABASE_URL = "https://qjdtojpcprbngcxoyogd.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZHRvanBjcHJibmdjeG95b2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTA4NzMsImV4cCI6MjA5OTA4Njg3M30.Hcwewr7vDaza0XEtLrgg_vMA6ym9wSSBVcCnoqSiSNQ";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const MAX_PARTICIPANTS = 64;
    const MAX_TEAMS = 16;
    let participantsData = [];
    let currentEditToken = "";

    window.onload = async function() {
        initTeamGrid();
        loadParticipantsData();
        subscribeRealtime();
    };

    // 16개의 빈 팀 박스를 미리 생성하는 함수
    function initTeamGrid() {
        const grid = document.getElementById('team-grid');
        grid.innerHTML = "";
        for (let i = 0; i < MAX_TEAMS; i++) {
            const cell = document.createElement('div');
            cell.className = "team-cell empty";
            cell.innerText = "팀 결성 대기 중";
            cell.id = `team-cell-${i}`;
            grid.appendChild(cell);
        }
    }

    function closeModals() {
        document.getElementById('add-modal').style.display = "none";
        document.getElementById('edit-modal').style.display = "none";
        currentEditToken = "";
    }

    function openAddModal() {
        if (participantsData.length >= MAX_PARTICIPANTS) {
            alert("64명 엔트리가 모두 찼습니다.");
            return;
        }
        document.getElementById('add-name').value = "";
        document.getElementById('add-damage').value = "";
        document.getElementById('add-intro').value = "";
        document.getElementById('add-modal').style.display = "flex";
    }

    function openEditModal(token) {
        const user = participantsData.find(p => p.p_token === token);
        if (!user) return;

        currentEditToken = token;
        document.getElementById('edit-fakename').innerText = `고유 가명: ${user.fake_name}`;
        document.getElementById('edit-name').value = user.real_name;
        document.getElementById('edit-tier').value = user.tier;
        document.getElementById('edit-damage').value = user.avg_damage;
        document.getElementById('edit-intro').value = user.intro;
        document.getElementById('edit-team').value = user.team_name || "";

        document.getElementById('edit-modal').style.display = "flex";
    }

    async function loadParticipantsData() {
        const { data } = await supabaseClient.from('participants').select('*').order('created_at', { ascending: true });
        if (!data) return;
        
        participantsData = data;
        renderGrid();
        renderCompletedTeams();
    }

    function renderGrid() {
        const grid = document.getElementById('participant-grid');
        grid.innerHTML = "";

        for (let i = 0; i < MAX_PARTICIPANTS; i++) {
            const cell = document.createElement('div');
            
            if (i < participantsData.length) {
                const p = participantsData[i];
                cell.className = "grid-cell active";
                cell.onclick = () => openEditModal(p.p_token);
                
                let cellHTML = `
                    <div class="cell-name">${p.fake_name}</div>
                    <div class="cell-stats">${p.tier} | 딜량: ${p.avg_damage}</div>
                    <div class="cell-intro">"${p.intro}"</div>
                `;
                
                if (p.team_name) {
                    cell.classList.add('teamed');
                    cellHTML += `<div class="team-label">[${p.team_name}]</div>`;
                }
                cell.innerHTML = cellHTML;
            } else {
                cell.className = "grid-cell";
                cell.innerText = "빈 자리 (클릭하여 추가)";
                cell.onclick = openAddModal;
            }
            grid.appendChild(cell);
        }
    }

    async function addUser() {
        const rName = document.getElementById('add-name').value.trim();
        const rTier = document.getElementById('add-tier').value;
        const rDmg = parseInt(document.getElementById('add-damage').value);
        const rIntro = document.getElementById('add-intro').value.trim();

        if (!rName || !rDmg || !rIntro) {
            alert("모든 항목을 입력해주세요.");
            return;
        }

        const token = "p_" + Math.random().toString(36).substr(2, 9);
        const words = ["길리슈트", "보급상자", "삼뚝", "진통제", "프라이팬", "레드존", "구급상자", "수류탄", "다시아", "오토바이"];
        const fakeName = "익명_" + words[Math.floor(Math.random() * words.length)] + "_" + Math.random().toString(36).substr(2, 4).toUpperCase();

        const newUser = { p_token: token, real_name: rName, fake_name: fakeName, avg_damage: rDmg, tier: rTier, intro: rIntro, team_name: null };

        await supabaseClient.from('participants').insert([newUser]);
        closeModals();
    }

    async function updateUser() {
        if (!currentEditToken) return;

        const rName = document.getElementById('edit-name').value.trim();
        const rTier = document.getElementById('edit-tier').value;
        const rDmg = parseInt(document.getElementById('edit-damage').value);
        const rIntro = document.getElementById('edit-intro').value.trim();
        let rTeam = document.getElementById('edit-team').value.trim();
        
        if (rTeam === "") rTeam = null;

        if (!rName || !rDmg || !rIntro) {
            alert("모든 항목을 올바르게 입력해주세요.");
            return;
        }

        await supabaseClient.from('participants')
            .update({ real_name: rName, tier: rTier, avg_damage: rDmg, intro: rIntro, team_name: rTeam })
            .eq('p_token', currentEditToken);
            
        closeModals();
    }

    async function deleteUser() {
        if (!currentEditToken) return;
        
        if (confirm("정말로 이 참가자를 명단에서 삭제하시겠습니까?")) {
            await supabaseClient.from('participants').delete().eq('p_token', currentEditToken);
            closeModals();
        }
    }

    // 4명이 모인 팀을 추려 16개 그리드에 채워 넣는 함수
    function renderCompletedTeams() {
        const teams = {};
        
        // 팀 이름별로 인원 수집
        participantsData.forEach(p => {
            if (p.team_name) {
                if (!teams[p.team_name]) teams[p.team_name] = [];
                teams[p.team_name].push(p);
            }
        });

        // 4명 이상인 팀만 필터링하여 배열로 변환 후 정렬 (예: 1팀, 2팀 순서대로 정렬)
        const completedTeams = Object.entries(teams)
            .filter(([teamName, members]) => members.length >= 4)
            .sort((a, b) => a[0].localeCompare(b[0]));

        // 16개 셀 업데이트
        for (let i = 0; i < MAX_TEAMS; i++) {
            const cell = document.getElementById(`team-cell-${i}`);
            
            if (i < completedTeams.length) {
                // 팀이 결성된 자리
                const [teamName, members] = completedTeams[i];
                cell.className = "team-cell active";
                
                let html = `<h4 class="team-title">${teamName}</h4><div>`;
                members.forEach(m => {
                    html += `<span class="team-member">${m.fake_name} (실명: ${m.real_name})</span>`;
                });
                html += `</div>`;
                cell.innerHTML = html;
            } else {
                // 아직 결성되지 않은 빈자리
                cell.className = "team-cell empty";
                cell.innerHTML = "팀 결성 대기 중";
            }
        }
    }

    function subscribeRealtime() {
        supabaseClient.channel('teams-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'participants' }, 
            payload => {
                loadParticipantsData();
            }).subscribe();
    }
</script>
</body>
</html>
