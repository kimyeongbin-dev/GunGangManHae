<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건강만해 - 배틀그라운드 팀 경매 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .admin-panel { display: flex; gap: 10px; }
        .admin-panel input { padding: 5px; background: #222; border: 1px solid #555; color: #fff; }
        .admin-panel button { padding: 5px 15px; background: #4caf50; border: none; color: white; cursor: pointer; font-weight: bold; }
        .container { display: flex; gap: 15px; flex-direction: column; }

        /* 좌측: 미배정 참가자 8x8 그리드 */
        .left-panel { flex: 0.8; background: #1e1e1e; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; overflow-y: hidden; }
        .grid-legend { display: flex; gap: 15px; margin-bottom: 10px; font-size: 12px; justify-content: flex-end; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-box { width: 12px; height: 12px; border-radius: 2px; }
        .grid-container { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; flex: 1; }
        .grid-cell { width: 100%; aspect-ratio: 1.5; border: 1px dashed #555; background: #222; border-radius: 2px; cursor: pointer; }.grid-cell:hover { background: #333; border-color: #888; }
        
        /* 정보 표시 */
        .grid-cell { 
                position: relative; /* 자식 요소(딜량)를 위치시키기 위함 */
                width: 100%; 
                aspect-ratio: 1; 
                border: 1px dashed #555; 
                background: #222; 
                border-radius: 2px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-size: 10px; /* 작은 셀 안에 들어가야 하므로 글자 크기 최소화 */
                color: #fff;
                cursor: pointer;
            }
        .grid-cell.occupied { border-style: solid; font-weight: bold;}
        .nick-text { color: #ffeb3b; } /* 닉네임 색상 구분 */
        .damage-text { color: #ffffff; }

        /* 티어별 색상 가이드 (빈 셀 테두리색 차별화) */
        .tier-1 { border-color: #ff9800; }
        .tier-2 { border-color: #2196f3; }
        .tier-3 { border-color: #4caf50; }
        .tier-4 { border-color: #9e9e9e; }
        
        /* 인원이 들어왔을 때 색상 채우기 */
        .grid-cell.occupied.tier-1 { background: rgba(255, 152, 0, 0.3); border-style: solid; }
        .grid-cell.occupied.tier-2 { background: rgba(33, 150, 243, 0.3); border-style: solid; }
        .grid-cell.occupied.tier-3 { background: rgba(76, 175, 80, 0.3); border-style: solid; }
        .grid-cell.occupied.tier-4 { background: rgba(158, 158, 158, 0.3); border-style: solid; }
        .grid-cell.assigned { opacity: 0.4; border-style: dotted; }

        /* 우측 레이아웃 상/하 분할 */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
        .auction-board { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #ff9800; flex: 0 0 auto; }
        .target-card { background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 15px; text-align: center; }
        .target-card h2 { margin: 0 0 10px 0; color: #ff9800; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .form-group input, .form-group select { padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        .btn-bid { width: 100%; padding: 12px; background: #ff9800; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 4px; }
        .btn-bid:hover { background: #e68a00; }

        /* 우측 하단: 팀 확정 엔트리 현황 (5개 열 세로 리스트) */
        .team-list-panel { background: #1e1e1e; padding: 10px; border-radius: 8px; border: 1px solid #333; flex: 1; overflow-y: auto; }
        .team-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .team-table th { position: sticky; top: 0; background: #2d2d2d; padding: 6px; }
        .team-table td { padding: 5px; border: 1px solid #333; text-align: center; }
        .team-identity { background: #252525; width: 20%; font-weight: bold; }
        .team-pts { color: #ff9800; display: block; font-size: 11px; margin-top: 2px; }
        .team-member-cell { width: 20%; }
        .empty-member { color: #555; font-style: italic; }

        /* 커스텀 관리자 모달 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1e1e1e; margin: 10% auto; padding: 25px; border: 1px solid #444; width: 90%; max-width: 450px; border-radius: 8px; }
        .modal-content h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; color: #4caf50; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; color: white; }
        
        /* 기타 요소들 */
        h3 { margin: 5px 0; font-size: 16px; }
        .form-group { margin-bottom: 8px; }
        .btn-bid { padding: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>배틀그라운드 팀 경매 시스템</h1>
        <div class="admin-panel">
            <input type="password" id="adminCode" placeholder="진행자 코드">
            <button onclick="toggleAdmin()">진행자 접속</button>
        </div>
    </div>

    <div class="container" id="app-container">
        <!-- 좌측: 미배정 참가자 목록 (8x8 그리드) -->
        <div class="left-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;">미배정 참가자 목록 (16x4 대기석)</h3>
                <div class="grid-legend">
                    <div class="legend-item"><div class="legend-box" style="background:#ff9800"></div>1티어</div>
                    <div class="legend-item"><div class="legend-box" style="background:#2196f3"></div>2티어</div>
                    <div class="legend-item"><div class="legend-box" style="background:#4caf50"></div>3티어</div>
                    <div class="legend-item"><div class="legend-box" style="background:#9e9e9e"></div>4티어</div>
                </div>
            </div>
            <div class="grid-container" id="unassignedGrid">
                <!-- 자바스크립트로 8x8 그리드 셀 생성 -->
            </div>
        </div>

        <!-- 우측: 경매 인터페이스 및 확정 엔트리 리스트 -->
        <div class="right-panel">
            <!-- 우측 상단: 경매 진행 창 -->
            <div class="auction-board" style="display: flex; gap: 15px;">
                <div style="flex: 1;" class="target-card" id="auctionTarget">
                    <h2>대기 중</h2>
                    <p>참가자를 선택하세요.</p>
                </div>
                
                <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                    <div class="form-group">
                        <select id="teamSelect"></select>
                        <input type="number" id="bidAmount" placeholder="입찰 포인트">
                        <button class="btn-bid" onclick="submitBid()">낙찰 확정</button>
                    </div>
                    
                    <div id="auctionLog" style="background: #111; padding: 10px; font-size: 11px; height: 100px; overflow-y: auto; border: 1px solid #444;">
                        <div style="color:#aaa;">[경매 로그] 시작 대기 중...</div>
                    </div>
                </div>
            </div>

            <!-- 우측 하단: 팀 확정 엔트리 현황 (5개 열 구조 세로 리스트) -->
            <div class="team-list-panel">
                <h3>팀 확정 엔트리 현황</h3>
                <table class="team-table">
                    <thead>
                        <tr>
                            <th>팀명 [포인트]</th>
                            <th>1티어 팀원</th>
                            <th>2티어 팀원</th>
                            <th>3티어 팀원</th>
                            <th>4티어 팀원</th>
                        </tr>
                    </thead>
                    <tbody id="teamListBody">
                        <!-- 1팀부터 16팀까지 로우 생성 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 진행자 전용 참가자 추가/수정/삭제 모달 -->
    <div id="participantModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">참가자 관리</h3>
            <input type="hidden" id="modalSlotIndex">
            <input type="hidden" id="modalPToken">
            
            <div class="form-group">
                <label>실명</label>
                <input type="text" id="modalRealName" placeholder="예: 홍길동">
            </div>
            <div class="form-group">
                <label>익명 (식별 닉네임)</label>
                <input type="text" id="modalFakeName" placeholder="예: 참가자A">
            </div>
            <div class="form-group">
                <label>평균 딜량</label>
                <input type="number" id="modalAvgDamage" placeholder="예: 250">
            </div>
            <div class="form-group">
                <label>소갯말</label>
                <input type="text" id="modalIntro" placeholder="한 줄 소갯말을 입력하세요">
            </div>
            
            <div class="modal-buttons">
                <button onclick="saveParticipant()" style="background:#4caf50;">저장</button>
                <button id="modalDeleteBtn" onclick="deleteParticipantFromModal()" style="background:#ff4c4c; display:none;">삭제</button>
                <button onclick="closeModal()" style="background:#555;">취소</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://qjdtojpcprbngcxoyogd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZHRvanBjcHJibmdjeG95b2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTA4NzMsImV4cCI6MjA5OTA4Njg3M30.Hcwewr7vDaza0XEtLrgg_vMA6ym9wSSBVcCnoqSiSNQ";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isAdmin = false;
        let participants = [];
        let auctionBids = [];
        let currentAuctionTarget = null;

        // 진행자 접속 제어
        function toggleAdmin() {
            const code = document.getElementById('adminCode').value;
            if(code === '0000') {
                isAdmin = true;
                document.getElementById('app-container').classList.add('admin-mode');
                alert('진행자 권한이 인증되었습니다. 빈 셀 관리 및 데이터 제어가 가능합니다.');
                renderAll();
            } else {
                alert('코드가 일치하지 않습니다.');
            }
        }

        // 슬롯 번호(0~63) 기준 티어 매핑 규칙 설정 (행 단위 배치)
        function getTierBySlot(slotIndex) {
            const row = Math.floor(slotIndex / 8);
            if (row === 0 || row === 1) return "1";
            if (row === 2 || row === 3) return "2";
            if (row === 4 || row === 5) return "3";
            if (row === 6 || row === 7) return "4";
            return "1";
        }

        // 통합 데이터 호출 및 화면 리프레시
        async function loadData() {
            const [resParticipants, resBids] = await Promise.all([
                supabaseClient.from('participants').select('*').order('created_at', { ascending: true }),
                supabaseClient.from('auction_bids').select('*')
            ]);

            if (resParticipants.error) console.error(resParticipants.error);
            if (resBids.error) console.error(resBids.error);

            participants = resParticipants.data || [];
            auctionBids = resBids.data || [];

            renderAll();
        }

        function renderAll() {
            renderUnassignedGrid();
            renderTeamList();
            renderTeamSelectOptions();
        }

        // 좌측 8x8 그리드 구성
        function renderUnassignedGrid() {
            const grid = document.getElementById('unassignedGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 64; i++) {
                const tier = getTierBySlot(i);
                const p = participants.find(part => part.slot_index === i);
                
                const btn = document.createElement('button');
                btn.className = `grid-cell tier-${tier}`;
                
                if (p) {
                    btn.classList.add('occupied');
                    if (p.team_name) {
                        btn.classList.add('assigned');
                    }

                    btn.innerHTML = `
                        <span class="nick-text">${p.fake_name}</span>
                        <span class="damage-text">딜량: ${p.avg_damage}</span>
                    `;

                    const displayName = isAdmin ? `${p.fake_name} (${p.real_name})` : p.fake_name;
                    btn.title = `[${tier}티어] ${displayName} | 딜량: ${p.avg_damage} | 상태: ${p.team_name || '미배정'}`;
                    
                    btn.onclick = () => {
                        if (isAdmin) {
                            openModal(i, p);
                        } else {
                            if (!p.team_name) {
                                setAuctionTarget(p);
                            } else {
                                alert('이미 팀 구성이 완료된 참가자입니다.');
                            }
                        }
                    };
                } else {
                    btn.title = `[${tier}티어] 빈 자리`;
                    btn.onclick = () => {
                        if (isAdmin) {
                            openModal(i, null);
                        } else {
                            alert('진행자 모드에서만 공석에 새로운 참가자를 등록할 수 있습니다.');
                        }
                    };
                }
                grid.appendChild(btn);
            }
        }

        // 우측 하단: 5개 열 기준 세로 리스트 테이블 구조 출력
        function renderTeamList() {
            const tbody = document.getElementById('teamListBody');
            tbody.innerHTML = '';

            // 팀별 낙찰 포인트 누적 연산
            const teamPoints = {};
            for (let t = 1; t <= 16; t++) {
                teamPoints[`${t}팀`] = 0;
            }
            auctionBids.forEach(bid => {
                if (bid.team_name) {
                    teamPoints[bid.team_name] = (teamPoints[bid.team_name] || 0) + bid.bid_amount;
                }
            });

            // 1팀부터 16팀까지 한 행씩 5개 열 생성
            for (let t = 1; t <= 16; t++) {
                const teamName = `${t}팀`;
                const teamMembers = participants.filter(p => p.team_name === teamName);

                const m1 = teamMembers.find(p => String(p.tier) === '1');
                const m2 = teamMembers.find(p => String(p.tier) === '2');
                const m3 = teamMembers.find(p => String(p.tier) === '3');
                const m4 = teamMembers.find(p => String(p.tier) === '4');

                const formatCell = (member) => {
                    if (!member) return `<span class="empty-member">공석</span>`;
                    return isAdmin ? `${member.fake_name}(${member.real_name})` : member.fake_name;
                };

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="team-identity">[${teamName}] <span class="team-pts">${teamPoints[teamName]} pts</span></td>
                    <td class="team-member-cell">${formatCell(m1)}</td>
                    <td class="team-member-cell">${formatCell(m2)}</td>
                    <td class="team-member-cell">${formatCell(m3)}</td>
                    <td class="team-member-cell">${formatCell(m4)}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 경매 입찰창 팀 선택 옵션 (고정 1~16팀 구성)
        function renderTeamSelectOptions() {
            const select = document.getElementById('teamSelect');
            select.innerHTML = '<option value="">팀을 선택하세요</option>';
            for (let t = 1; t <= 16; t++) {
                const opt = document.createElement('option');
                opt.value = `${t}팀`;
                opt.textContent = `${t}팀`;
                select.appendChild(opt);
            }
        }

        // 경매 대상 참가자 설정
        function setAuctionTarget(participant) {
            currentAuctionTarget = participant;
            const targetDiv = document.getElementById('auctionTarget');
            const displayName = isAdmin ? `${participant.fake_name} (${participant.real_name})` : participant.fake_name;
            
            targetDiv.innerHTML = `
                <h2>${displayName}</h2>
                <p><strong>티어:</strong> ${participant.tier}티어 | <strong>평균 딜량:</strong> ${participant.avg_damage}</p>
                <p style="background: #333; padding: 10px; border-radius: 4px; font-style: italic; font-size:13px; text-align:left;">${participant.intro}</p>
            `;
        }

        // 로그 추가 함수
        function addAuctionLog(message) {
            const logDiv = document.getElementById('auctionLog');
            const time = new Date().toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
            const entry = document.createElement('div');
            entry.textContent = `[${time}] ${message}`;
            logDiv.prepend(entry); // 최신 로그가 위로 오게
        }

        // 낙찰 확정 비즈니스 로직
        async function submitBid() {
            if (!currentAuctionTarget) return alert('경매를 진행할 대상 참가자를 대기석에서 먼저 골라주세요.');
            const teamName = document.getElementById('teamSelect').value;
            const bidAmount = document.getElementById('bidAmount').value;

            if (!teamName || !bidAmount) return alert('낙찰 배정할 팀과 포인트 금액을 명확히 입력해 주세요.');

            // 티어 중복 여부 사전 검증
            const targetTier = String(currentAuctionTarget.tier);
            const teamMembers = participants.filter(p => p.team_name === teamName);
            const isTierOccupied = teamMembers.some(p => String(p.tier) === targetTier);

            if (isTierOccupied) {
                return alert(`선택하신 ${teamName}에는 이미 ${targetTier}티어 팀원이 존재합니다. 티어별 한 명씩만 배치 가능합니다.`);
            }

            // 1. participants 테이블 팀 소속 동기화
            const { error: updateError } = await supabaseClient
                .from('participants')
                .update({ team_name: teamName })
                .eq('p_token', currentAuctionTarget.p_token);

            if (updateError) return alert('팀 배정 데이터 반영에 오류가 발생했습니다: ' + updateError.message);

            // 2. auction_bids 로깅 및 팀명 기록 추가
            const { error: insertError } = await supabaseClient
                .from('auction_bids')
                .insert([{
                    p_token: currentAuctionTarget.p_token,
                    real_name: currentAuctionTarget.real_name,
                    fake_name: currentAuctionTarget.fake_name,
                    bid_amount: parseInt(bidAmount),
                    team_name: teamName
                }]);

            if (insertError) console.error('히스토리 내역 저장 실패:', insertError);

            // 성공 시 로그 출력
            addAuctionLog(`${currentAuctionTarget.fake_name} → ${teamName} 낙찰 (${bidAmount}P)`);
            alert(`${currentAuctionTarget.fake_name} 참가자가 성공적으로 ${teamName}에 확정 배치되었습니다.`);
            currentAuctionTarget = null;
            document.getElementById('auctionTarget').innerHTML = '<h2>대기 중</h2><p>좌측 대기석에서 경매 대상 참가자 셀을 선택하세요.</p>';
            document.getElementById('bidAmount').value = '';
            
            loadData();
        }

        // 모달 열기 및 제어 상태 분기
        function openModal(slotIndex, participant) {
            document.getElementById('participantModal').style.display = 'block';
            document.getElementById('modalSlotIndex').value = slotIndex;
            const tier = getTierBySlot(slotIndex);
            
            if (participant) {
                document.getElementById('modalTitle').textContent = `${tier}티어 참가자 상세 수정`;
                document.getElementById('modalPToken').value = participant.p_token;
                document.getElementById('modalRealName').value = participant.real_name;
                document.getElementById('modalFakeName').value = participant.fake_name;
                document.getElementById('modalAvgDamage').value = participant.avg_damage;
                document.getElementById('modalIntro').value = participant.intro;
                document.getElementById('modalDeleteBtn').style.display = 'inline-block';
            } else {
                document.getElementById('modalTitle').textContent = `${tier}티어 새 참가자 배정등록`;
                document.getElementById('modalPToken').value = '';
                document.getElementById('modalRealName').value = '';
                document.getElementById('modalFakeName').value = '';
                document.getElementById('modalAvgDamage').value = '';
                document.getElementById('modalIntro').value = '';
                document.getElementById('modalDeleteBtn').style.display = 'none';
            }
        }

        function closeModal() {
            document.getElementById('participantModal').style.display = 'none';
        }

        // 모달창 참가자 정보 추가 및 수정 인서트/업데이트 로직
        async function saveParticipant() {
            const slotIndex = parseInt(document.getElementById('modalSlotIndex').value);
            const pToken = document.getElementById('modalPToken').value;
            const realName = document.getElementById('modalRealName').value;
            const fakeName = document.getElementById('modalFakeName').value;
            const avgDamage = parseInt(document.getElementById('modalAvgDamage').value);
            const intro = document.getElementById('modalIntro').value;
            const tier = getTierBySlot(slotIndex);

            if (!realName || !fakeName || isNaN(avgDamage)) {
                alert('공란 없이 입력 값을 정확하게 채워주세요.');
                return;
            }

            if (pToken) {
                const { error } = await supabaseClient
                    .from('participants')
                    .update({ real_name: realName, fake_name: fakeName, avg_damage: avgDamage, intro: intro })
                    .eq('p_token', pToken);
                if (error) alert('수정 에러: ' + error.message);
            } else {
                const generatedToken = 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const { error } = await supabaseClient
                    .from('participants')
                    .insert([{
                        p_token: generatedToken,
                        real_name: realName,
                        fake_name: fakeName,
                        avg_damage: avgDamage,
                        tier: tier,
                        intro: intro,
                        slot_index: slotIndex
                    }]);
                if (error) alert('등록 에러: ' + error.message);
            }
            closeModal();
            loadData();
        }

        // 모달창 참가자 영구 삭제 로직
        async function deleteParticipantFromModal() {
            const pToken = document.getElementById('modalPToken').value;
            if (!pToken) return;
            if (!confirm('해당 데이터와 대기석 배정을 영구 삭제 조치하시겠습니까?')) return;

            const { error } = await supabaseClient
                .from('participants')
                .delete()
                .eq('p_token', pToken);

            if (error) {
                alert('삭제 작업 중 문제가 발생했습니다: ' + error.message);
            } else {
                closeModal();
                loadData();
            }
        }

        // 페이지 진입 초기 로드 실행
        loadData();
    </script>
</body>
</html>
