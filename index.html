<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GunGangManHae - 배틀그라운드 팀 경매</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 1200px; margin: 30px auto; padding: 20px; background-color: #1e1e24; color: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #f39c12; letter-spacing: 2px; }
        .box { background: #2b2b36; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 15px; background-color: #3498db; }
        
        /* 모달 (참가 신청 폼) 스타일 */
        #join-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #2b2b36; padding: 30px; border-radius: 8px; width: 400px; border: 2px solid #f39c12; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; border: none; border-radius: 4px; box-sizing: border-box; background: #fff; font-family: inherit; }
        .modal-content button { width: 100%; padding: 12px; background: #f39c12; color: #1e1e24; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* 8x8 그리드 레이아웃 */
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; margin-top: 15px; }
        .grid-cell { background-color: #3a3a48; border: 1px solid #444; border-radius: 4px; aspect-ratio: 16 / 9; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8px; box-sizing: border-box; overflow: hidden; }
        .grid-cell.active { border-color: #f39c12; background-color: #2e2e3a; }
        .grid-cell.teamed { border-color: #2ecc71; background-color: #1e3a29; }
        
        .cell-name { font-weight: bold; color: #f39c12; font-size: 13px; margin-bottom: 2px; }
        .cell-stats { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .cell-intro { font-size: 10px; color: #888; font-style: italic; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .team-label { color: #2ecc71; font-weight: bold; font-size: 11px; margin-top: 4px; }

        /* 하단 레이아웃 */
        .bottom-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input[type="number"] { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
        button.btn-bid { padding: 12px 20px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; background-color: #f39c12; color: #1e1e24; cursor: pointer; }
        
        ul { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
        li { background: #3a3a48; margin-bottom: 8px; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #f39c12; font-size: 14px; }
        .amount { font-size: 16px; font-weight: bold; color: #f39c12; }
        
        .team-container { margin-top: 10px; padding: 12px; background: #222; border-radius: 6px; border: 1px solid #444; }
        .team-title { margin-top: 0; margin-bottom: 8px; color: #2ecc71; font-size: 16px; }
        .team-member { display: inline-block; background: #333; padding: 4px 8px; border-radius: 4px; margin: 0 4px 4px 0; font-size: 13px; }
    </style>
</head>
<body>

    <div id="join-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:#f39c12; text-align:center;">참가자 프로필 등록</h2>
            <label>닉네임 (또는 실명)</label>
            <input type="text" id="reg-name" placeholder="예: 춘천불주먹" required>
            
            <label>배그 티어</label>
            <select id="reg-tier">
                <option value="브론즈">브론즈</option>
                <option value="실버">실버</option>
                <option value="골드">골드</option>
                <option value="플래티넘">플래티넘</option>
                <option value="다이아">다이아</option>
                <option value="마스터">마스터</option>
                <option value="그랜드마스터">그랜드마스터</option>
            </select>
            
            <label>평균 딜량 (숫자만)</label>
            <input type="number" id="reg-damage" placeholder="예: 250" required>
            
            <label>한 줄 소갯말</label>
            <input type="text" id="reg-intro" placeholder="예: 오더 잘 듣습니다. 백업 빠릅니다." required>
            
            <button onclick="registerUser()">엔트리 등록하기</button>
        </div>
    </div>

    <div class="header">
        <h1>GunGangManHae</h1>
    </div>

    <div class="box">
        <h3 style="margin: 0;">참가자 엔트리 현황 (최대 64명)</h3>
        <div id="participant-grid" class="grid-container">
            </div>
    </div>

    <div class="bottom-section">
        <div class="box" style="margin-bottom: 0;">
            <div id="role-badge" class="status-badge">접속 확인 중...</div>
            <div id="bid-section" style="display: none;">
                <h3 style="margin-top:0;">포인트 입찰</h3>
                <div class="input-group">
                    <input type="number" id="input-amount" placeholder="금액 입력" onkeypress="if(event.key === 'Enter') submitBid()">
                    <button class="btn-bid" onclick="submitBid()">입찰</button>
                </div>
            </div>
        </div>

        <div class="box" style="margin-bottom: 0;">
            <h3 style="margin-top:0;">실시간 로그</h3>
            <ul id="bid-list"></ul>
        </div>

        <div class="box" style="margin-bottom: 0;">
            <h3 style="margin-top:0; color:#2ecc71;">완성된 팀 (4인)</h3>
            <div id="team-list-container">
                <p style="color:#777; font-size:14px;">아직 완성된 팀이 없습니다.</p>
            </div>
        </div>
    </div>

<script>
    // 요청하신 URL과 키 적용 완료
    const SUPABASE_URL = "https://qjdtojpcprbngcxoyogd.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZHRvanBjcHJibmdjeG95b2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTA4NzMsImV4cCI6MjA5OTA4Njg3M30.Hcwewr7vDaza0XEtLrgg_vMA6ym9wSSBVcCnoqSiSNQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let userProfile = null;
    const MAX_PARTICIPANTS = 64;

    window.onload = async function() {
        initGrid();
        await checkUserSession();
        loadParticipantsData();
        loadExistingBids();
        subscribeRealtime();
    };

    function initGrid() {
        const grid = document.getElementById('participant-grid');
        grid.innerHTML = "";
        for (let i = 0; i < MAX_PARTICIPANTS; i++) {
            const cell = document.createElement('div');
            cell.className = "grid-cell";
            cell.innerText = "빈 자리";
            cell.id = `cell-${i}`;
            grid.appendChild(cell);
        }
    }

    async function checkUserSession() {
        let storedData = localStorage.getItem('ggmh_user');
        if (storedData) {
            userProfile = JSON.parse(storedData);
            activateUserPanel();
        } else {
            // 유저 정보가 없으면 모달 창 띄우기
            document.getElementById('join-modal').style.display = "flex";
        }
    }

    // 모달창에서 등록 버튼을 눌렀을 때 실행
    async function registerUser() {
        const rName = document.getElementById('reg-name').value.trim();
        const rTier = document.getElementById('reg-tier').value;
        const rDmg = parseInt(document.getElementById('reg-damage').value);
        const rIntro = document.getElementById('reg-intro').value.trim();

        if (!rName || !rDmg || !rIntro) {
            alert("모든 항목을 입력해주세요.");
            return;
        }

        const token = "p_" + Math.random().toString(36).substr(2, 9);
        const words = ["길리슈트", "보급상자", "삼뚝", "진통제", "프라이팬", "레드존", "구급상자", "수류탄"];
        const fakeName = "익명_" + words[Math.floor(Math.random() * words.length)] + "_" + Math.random().toString(36).substr(2, 4).toUpperCase();

        userProfile = { 
            p_token: token, 
            real_name: rName, 
            fake_name: fakeName, 
            avg_damage: rDmg, 
            tier: rTier, 
            intro: rIntro, 
            team_name: null 
        };

        await supabase.from('participants').insert([userProfile]);
        localStorage.setItem('ggmh_user', JSON.stringify(userProfile));
        
        document.getElementById('join-modal').style.display = "none";
        activateUserPanel();
    }

    function activateUserPanel() {
        document.getElementById('role-badge').innerText = `내 익명: ${userProfile.fake_name}`;
        document.getElementById('bid-section').style.display = "block";
    }

    async function loadParticipantsData() {
        const { data } = await supabase.from('participants').select('*').order('created_at', { ascending: true });
        if (!data) return;

        initGrid();
        
        data.forEach((p, index) => {
            if (index >= MAX_PARTICIPANTS) return;
            const cell = document.getElementById(`cell-${index}`);
            cell.className = "grid-cell active";
            
            let cellHTML = `
                <div class="cell-name">${p.fake_name}</div>
                <div class="cell-stats">${p.tier} | 딜량: ${p.avg_damage}</div>
                <div class="cell-intro">"${p.intro}"</div>
            `;
            
            if (p.team_name) {
                cell.classList.add('teamed');
                cellHTML += `<div class="team-label">[${p.team_name} 팀]</div>`;
            }
            
            cell.innerHTML = cellHTML;
        });

        renderCompletedTeams(data);
    }

    async function submitBid() {
        const inputObj = document.getElementById('input-amount');
        const amount = parseInt(inputObj.value);
        if (!amount || amount <= 0) return;

        inputObj.disabled = true;

        await supabase.from('auction_bids').insert([{
            p_token: userProfile.p_token,
            real_name: userProfile.real_name,
            fake_name: userProfile.fake_name,
            bid_amount: amount
        }]);

        inputObj.disabled = false;
        inputObj.value = "";
        inputObj.focus();
    }

    async function loadExistingBids() {
        const { data } = await supabase.from('auction_bids').select('*').order('created_at', { ascending: false });
        if (data) {
            const list = document.getElementById('bid-list');
            list.innerHTML = "";
            data.forEach(bid => appendBid(bid, list));
        }
    }

    function renderCompletedTeams(participantsData) {
        const container = document.getElementById('team-list-container');
        const teams = {};
        
        participantsData.forEach(p => {
            if (p.team_name) {
                if (!teams[p.team_name]) teams[p.team_name] = [];
                teams[p.team_name].push(p);
            }
        });

        container.innerHTML = "";
        let hasCompleted = false;

        for (const [teamName, members] of Object.entries(teams)) {
            if (members.length >= 4) {
                hasCompleted = true;
                const teamDiv = document.createElement('div');
                teamDiv.className = "team-container";
                
                let html = `<h4 class="team-title">${teamName} 팀</h4><div>`;
                members.forEach(m => {
                    html += `<span class="team-member">${m.fake_name} (실명: ${m.real_name})</span>`;
                });
                html += `</div>`;
                teamDiv.innerHTML = html;
                container.appendChild(teamDiv);
            }
        }

        if (!hasCompleted) {
            container.innerHTML = '<p style="color:#777; font-size:14px;">아직 4인이 모두 모인 팀이 없습니다.</p>';
        }
    }

    function subscribeRealtime() {
        supabase.channel('bids-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'auction_bids' }, 
            payload => {
                const list = document.getElementById('bid-list');
                appendBid(payload.new, list);
            }).subscribe();

        supabase.channel('teams-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'participants' }, 
            payload => {
                loadParticipantsData();
            }).subscribe();
    }

    function appendBid(bid, listElement) {
        const li = document.createElement('li');
        li.innerHTML = `<span>${bid.fake_name}</span> <span class="amount">${bid.bid_amount.toLocaleString()} P</span>`;
        listElement.insertBefore(li, listElement.firstChild);
    }
</script>
</body>
</html>
