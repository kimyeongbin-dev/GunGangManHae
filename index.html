<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GunGangManHae - 배틀그라운드 경매</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; background-color: #1e1e24; color: #fff; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #f39c12; }
        .box { background: #2b2b36; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 15px; background-color: #3498db; }
        .input-group { display: flex; gap: 10px; }
        input[type="number"] { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; background: #fff; }
        button { padding: 12px 20px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; background-color: #f39c12; color: #1e1e24; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #d68910; }
        ul { list-style: none; padding: 0; margin: 0; max-height: 350px; overflow-y: auto; }
        li { background: #3a3a48; margin-bottom: 8px; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #f39c12; }
        .amount { font-size: 18px; font-weight: bold; color: #f39c12; }
        .team-container { margin-top: 15px; padding: 15px; background: #222; border-radius: 6px; border: 1px solid #444; }
        .team-title { margin-top: 0; color: #2ecc71; font-size: 18px; }
        .team-member { display: inline-block; background: #333; padding: 5px 10px; border-radius: 4px; margin: 5px 5px 0 0; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>GunGangManHae 경매장</h1>
    </div>

    <div class="box">
        <div id="role-badge" class="status-badge">접속 확인 중...</div>
        
        <div id="bid-section" style="display: none;">
            <p style="margin-top:0; font-size:14px; color:#aaa;">입찰할 포인트를 입력하고 엔터 또는 버튼을 누르세요.</p>
            <div class="input-group">
                <input type="number" id="input-amount" placeholder="예: 150" onkeypress="if(event.key === 'Enter') submitBid()">
                <button onclick="submitBid()">입찰하기</button>
            </div>
        </div>
    </div>

    <div class="box">
        <h3 style="margin-top:0;">실시간 입찰 로그 (전체 익명)</h3>
        <ul id="bid-list">
        </ul>
    </div>

    <div class="box">
        <h3 style="margin-top:0; color:#2ecc71;">완성된 팀 결과 공개</h3>
        <p style="font-size:13px; color:#aaa; margin-top:-10px;">4인이 배정된 팀만 실명이 공개됩니다.</p>
        <div id="team-list-container">
            <p style="color:#777;">아직 완성된 팀이 없습니다.</p>
        </div>
    </div>

<script>
    // 본인의 주소와 키로 반드시 변경하십시오.
    const SUPABASE_URL = "https://your-project-url.supabase.co";
    const SUPABASE_ANON_KEY = "your-anon-key";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let userProfile = null;

    window.onload = async function() {
        await setupParticipant();
        loadExistingBids();
        loadCompletedTeams();
        subscribeRealtime();
    };

    async function setupParticipant() {
        let storedData = localStorage.getItem('ggmh_user');
        
        if (storedData) {
            userProfile = JSON.parse(storedData);
        } else {
            let realName = prompt("배틀그라운드 대회에 참가할 실명(또는 닉네임)을 입력하세요.");
            if (!realName || realName.trim() === "") {
                alert("실명을 입력해야 참여할 수 있습니다.");
                window.location.reload();
                return;
            }

            const token = "p_" + Math.random().toString(36).substr(2, 9);
            const animals = ["길리슈트", "보급상자", "삼뚝", "진통제", "프라이팬", "레드존", "구급상자", "수류탄"];
            const fakeName = "익명_" + animals[Math.floor(Math.random() * animals.length)] + "_" + Math.random().toString(36).substr(2, 4).toUpperCase();

            userProfile = { p_token: token, real_name: realName.trim(), fake_name: fakeName, team_name: null };

            await supabase.from('participants').insert([userProfile]);
            localStorage.setItem('ggmh_user', JSON.stringify(userProfile));
        }

        document.getElementById('role-badge').innerText = `접속자: ${userProfile.fake_name}`;
        document.getElementById('bid-section').style.display = "block";
    }

    async function submitBid() {
        const inputObj = document.getElementById('input-amount');
        const amount = parseInt(inputObj.value);

        if (!amount || amount <= 0) return;

        inputObj.disabled = true;

        await supabase.from('auction_bids').insert([{
            p_token: userProfile.p_token,
            real_name: userProfile.real_name,
            fake_name: userProfile.fake_name,
            bid_amount: amount
        }]);

        inputObj.disabled = false;
        inputObj.value = "";
        inputObj.focus();
    }

    async function loadExistingBids() {
        const { data } = await supabase.from('auction_bids').select('*').order('created_at', { ascending: false });
        if (data) {
            const list = document.getElementById('bid-list');
            list.innerHTML = "";
            data.forEach(bid => appendBid(bid, list));
        }
    }

    // 4인 완성 팀 불러오기 및 렌더링
    async function loadCompletedTeams() {
        const { data } = await supabase.from('participants').select('*').not('team_name', 'is', null);
        const container = document.getElementById('team-list-container');
        
        if (!data || data.length === 0) {
            container.innerHTML = '<p style="color:#777;">아직 완성된 팀이 없습니다.</p>';
            return;
        }

        // 팀 이름 기준으로 데이터 그룹화
        const teams = {};
        data.forEach(p => {
            if (!teams[p.team_name]) teams[p.team_name] = [];
            teams[p.team_name].push(p);
        });

        container.innerHTML = "";
        let hasCompleted = false;

        // 4명 이상인 팀만 필터링하여 화면에 표시
        for (const [teamName, members] of Object.entries(teams)) {
            if (members.length >= 4) {
                hasCompleted = true;
                const teamDiv = document.createElement('div');
                teamDiv.className = "team-container";
                
                let html = `<h4 class="team-title">${teamName} 팀</h4><div>`;
                members.forEach(m => {
                    html += `<span class="team-member">${m.fake_name} (실명: ${m.real_name})</span>`;
                });
                html += `</div>`;
                teamDiv.innerHTML = html;
                container.appendChild(teamDiv);
            }
        }

        if (!hasCompleted) {
            container.innerHTML = '<p style="color:#777;">아직 4인이 모두 모인 팀이 없습니다.</p>';
        }
    }

    function subscribeRealtime() {
        // 입찰 기록 실시간 업데이트
        supabase.channel('bids-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'auction_bids' }, 
            payload => {
                const list = document.getElementById('bid-list');
                appendBid(payload.new, list);
            }).subscribe();

        // 팀 배정 상태 실시간 업데이트 (참가자 테이블 변경 감지)
        supabase.channel('teams-channel')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'participants' }, 
            payload => {
                loadCompletedTeams();
            }).subscribe();
    }

    function appendBid(bid, listElement) {
        const li = document.createElement('li');
        // 모두가 익명 가명만 보도록 고정
        li.innerHTML = `<span>${bid.fake_name}</span> <span class="amount">${bid.bid_amount.toLocaleString()} P</span>`;
        listElement.insertBefore(li, listElement.firstChild);
    }
</script>
</body>
</html>
