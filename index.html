<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건강만해 - 배틀그라운드 팀 경매</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .admin-panel { display: flex; gap: 10px; }
        .admin-panel input { padding: 5px; background: #222; border: 1px solid #555; color: #fff; }
        .admin-panel button { padding: 5px 15px; background: #4caf50; border: none; color: white; cursor: pointer; font-weight: bold; }
        .container { display: flex; gap: 20px; height: calc(100vh - 100px); }
        
        /* 좌측: 엔트리 테이블 */
        .left-panel { flex: 6; background: #1e1e1e; padding: 15px; border-radius: 8px; overflow-y: auto; }
        .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .tier-header { text-align: center; font-weight: bold; padding: 10px; background: #333; border-radius: 4px; }
        .cell { background: #2a2a2a; border: 1px solid #444; border-radius: 4px; min-height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 10px; font-size: 14px; }
        .cell-empty { background: transparent; border: 1px dashed #444; min-height: 50px; }
        .delete-btn { background: #ff4c4c; border: none; color: white; cursor: pointer; border-radius: 3px; padding: 2px 6px; font-size: 12px; display: none; }
        .admin-mode .delete-btn { display: inline-block; }

        /* 우측: 경매 인터페이스 */
        .right-panel { flex: 4; display: flex; flex-direction: column; gap: 20px; }
        .auction-board { background: #1e1e1e; padding: 20px; border-radius: 8px; flex: 1; border: 2px solid #ff9800; }
        .unassigned-list { background: #1e1e1e; padding: 15px; border-radius: 8px; flex: 1; overflow-y: auto; border: 1px solid #333; }
        .target-card { background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 20px; text-align: center; }
        .target-card h2 { margin: 0 0 10px 0; color: #ff9800; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-group input, .form-group select { padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        .btn-bid { width: 100%; padding: 12px; background: #ff9800; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 4px; }
        .btn-bid:hover { background: #e68a00; }
        .participant-item { display: flex; justify-content: space-between; padding: 8px; background: #2a2a2a; margin-bottom: 5px; border-radius: 4px; cursor: pointer; }
        .participant-item:hover { background: #3a3a3a; }
    </style>
</head>
<body>

    <div class="header">
        <h1>배틀그라운드 4인 1팀 경매 시스템</h1>
        <div class="admin-panel">
            <input type="password" id="adminCode" placeholder="진행자 코드">
            <button onclick="toggleAdmin()">진행자 접속</button>
        </div>
    </div>

    <div class="container" id="app-container">
        <div class="left-panel">
            <h3>팀 확정 엔트리 현황</h3>
            <div class="table-grid" id="entryGrid">
                <div class="tier-header">1티어 (팀장)</div>
                <div class="tier-header">2티어</div>
                <div class="tier-header">3티어</div>
                <div class="tier-header">4티어</div>
                </div>
        </div>

        <div class="right-panel">
            <div class="auction-board">
                <h3>경매 진행 창</h3>
                <div class="target-card" id="auctionTarget">
                    <h2>대기 중</h2>
                    <p>아래 목록에서 경매 대상자를 선택하세요.</p>
                </div>
                
                <div class="form-group">
                    <label>낙찰 팀 선택 (팀장 이름 또는 팀명)</label>
                    <select id="teamSelect">
                        <option value="">팀을 선택하세요</option>
                        </select>
                </div>
                <div class="form-group">
                    <label>낙찰 금액 (포인트)</label>
                    <input type="number" id="bidAmount" placeholder="예: 300">
                </div>
                <button class="btn-bid" onclick="submitBid()">낙찰 및 팀 확정</button>
            </div>

            <div class="unassigned-list">
                <h3>미배정 참가자 목록 (경매 대기)</h3>
                <div id="unassignedList"></div>
            </div>
        </div>
    </div>

    <script>
        // Supabase 초기화 (본인의 프로젝트 설정값으로 변경)
        const SUPABASE_URL = "https://qjdtojpcprbngcxoyogd.supabase.co";

        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZHRvanBjcHJibmdjeG95b2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MTA4NzMsImV4cCI6MjA5OTA4Njg3M30.Hcwewr7vDaza0XEtLrgg_vMA6ym9wSSBVcCnoqSiSNQ"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isAdmin = false;
        let participants = [];
        let currentAuctionTarget = null;

        // 진행자 접속 처리
        function toggleAdmin() {
            const code = document.getElementById('adminCode').value;
            if(code === '0000') { // 진행자 비밀번호
                isAdmin = true;
                document.getElementById('app-container').classList.add('admin-mode');
                alert('진행자 모드로 전환되었습니다. 실명 확인 및 삭제가 가능합니다.');
                renderAll();
            } else {
                alert('코드가 일치하지 않습니다.');
            }
        }

        // 참가자 데이터 불러오기
        async function fetchParticipants() {
            const { data, error } = await supabase.from('participants').select('*').order('created_at', { ascending: true });
            if (error) {
                console.error(error);
                return;
            }
            participants = data;
            renderAll();
        }

        // 전체 화면 렌더링 통합
        function renderAll() {
            renderEntryGrid();
            renderUnassignedList();
            renderTeamSelectOptions();
        }

        // 좌측 엔트리 그리드 렌더링
        function renderEntryGrid() {
            const grid = document.getElementById('entryGrid');
            // 기존 데이터 지우기 (헤더 4개 제외)
            while(grid.children.length > 4) {
                grid.removeChild(grid.lastChild);
            }

            // 배정된 인원들을 티어별로 분류
            const assigned = participants.filter(p => p.team_name);
            const maxTeams = 16; 
            
            for(let i = 0; i < maxTeams; i++) {
                for(let tier = 1; tier <= 4; tier++) {
                    const cellDiv = document.createElement('div');
                    // 임시 로직: 실제 팀 배정 로직에 맞게 필터링 필요 (여기서는 화면 표시용)
                    // 현재는 단순히 해당 티어의 배정된 인원을 순서대로 채워넣는 예시입니다.
                    const tierParticipants = assigned.filter(p => String(p.tier) === String(tier));
                    const p = tierParticipants[i];

                    if (p) {
                        cellDiv.className = 'cell';
                        const displayName = isAdmin ? `${p.fake_name} <br><small style="color:#aaa">(${p.real_name})</small>` : p.fake_name;
                        cellDiv.innerHTML = `
                            <div>
                                <strong>${displayName}</strong><br>
                                <span style="color:#888; font-size:12px;">딜량: ${p.avg_damage}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteParticipant('${p.p_token}')">X</button>
                        `;
                    } else {
                        // 빈 자리는 텍스트 없이 스타일만 유지
                        cellDiv.className = 'cell-empty';
                    }
                    grid.appendChild(cellDiv);
                }
            }
        }

        // 우측 하단 미배정 목록 렌더링
        function renderUnassignedList() {
            const listDiv = document.getElementById('unassignedList');
            listDiv.innerHTML = '';
            const unassigned = participants.filter(p => !p.team_name);

            unassigned.forEach(p => {
                const item = document.createElement('div');
                item.className = 'participant-item';
                const displayName = isAdmin ? `${p.fake_name} (${p.real_name})` : p.fake_name;
                item.innerHTML = `
                    <span>[${p.tier}티어] ${displayName}</span>
                    <span>딜량: ${p.avg_damage}</span>
                `;
                item.onclick = () => setAuctionTarget(p);
                listDiv.appendChild(item);
            });
        }

        // 팀 선택 셀렉트 박스 렌더링 (1티어 팀장 기준)
        function renderTeamSelectOptions() {
            const select = document.getElementById('teamSelect');
            select.innerHTML = '<option value="">팀을 선택하세요</option>';
            // 1티어로 등록된 인원들을 팀장으로 간주
            const teamLeaders = participants.filter(p => String(p.tier) === '1');
            
            teamLeaders.forEach((leader, idx) => {
                const opt = document.createElement('option');
                const teamName = leader.team_name || `팀 ${leader.fake_name}`;
                opt.value = teamName;
                opt.textContent = teamName;
                select.appendChild(opt);
            });
        }

        // 경매 대상자 선택
        function setAuctionTarget(participant) {
            currentAuctionTarget = participant;
            const targetDiv = document.getElementById('auctionTarget');
            const displayName = isAdmin ? `${participant.fake_name} (실명: ${participant.real_name})` : participant.fake_name;
            
            targetDiv.innerHTML = `
                <h2>${displayName}</h2>
                <p><strong>티어:</strong> ${participant.tier} | <strong>평균 딜량:</strong> ${participant.avg_damage}</p>
                <p style="background: #333; padding: 10px; border-radius: 4px; font-style: italic;">"${participant.intro}"</p>
            `;
        }

        // 낙찰 및 팀 배정 처리 (DB 업데이트 및 Insert)
        async function submitBid() {
            if (!currentAuctionTarget) return alert('경매 대상자를 먼저 선택해주세요.');
            const teamName = document.getElementById('teamSelect').value;
            const bidAmount = document.getElementById('bidAmount').value;

            if (!teamName || !bidAmount) return alert('낙찰 팀과 금액을 모두 입력해주세요.');

            // 1. participants 테이블 팀명 업데이트
            const { error: updateError } = await supabase
                .from('participants')
                .update({ team_name: teamName })
                .eq('p_token', currentAuctionTarget.p_token);

            if (updateError) return alert('팀 배정 실패: ' + updateError.message);

            // 2. auction_bids 테이블 기록 (히스토리용)
            const { error: insertError } = await supabase
                .from('auction_bids')
                .insert([{
                    p_token: currentAuctionTarget.p_token,
                    real_name: currentAuctionTarget.real_name,
                    fake_name: currentAuctionTarget.fake_name,
                    bid_amount: parseInt(bidAmount)
                }]);

            if (insertError) console.error('입찰 기록 저장 실패:', insertError);

            alert(`${currentAuctionTarget.fake_name}님이 ${teamName} 팀에 낙찰되었습니다!`);
            currentAuctionTarget = null;
            document.getElementById('auctionTarget').innerHTML = '<h2>대기 중</h2><p>아래 목록에서 경매 대상자를 선택하세요.</p>';
            document.getElementById('bidAmount').value = '';
            
            fetchParticipants(); // 화면 갱신
        }

        // 참가자 삭제 기능 (진행자 전용)
        async function deleteParticipant(token) {
            if(!isAdmin) return;
            if(!confirm('해당 참가자를 완전히 삭제하시겠습니까?')) return;

            const { error } = await supabase.from('participants').delete().eq('p_token', token);
            if(error) {
                alert('삭제 중 오류 발생: ' + error.message);
            } else {
                fetchParticipants();
            }
        }

        // 초기 데이터 로드
        fetchParticipants();
    </script>
</body>
</html>
